<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Toolbox icon -->
  <g transform="translate(56, 72)">
    <!-- Box body -->
    <rect x="8" y="36" width="128" height="72" rx="8" fill="none" stroke="white" stroke-width="6"/>
    <!-- Box lid -->
    <rect x="24" y="20" width="96" height="20" rx="4" fill="none" stroke="white" stroke-width="6"/>
    <!-- Handle -->
    <rect x="52" y="8" width="40" height="16" rx="8" fill="none" stroke="white" stroke-width="6"/>
    <!-- Tools inside -->
    <circle cx="44" cy="72" r="10" fill="none" stroke="white" stroke-width="4" opacity="0.7"/>
    <rect x="70" y="62" width="8" height="28" rx="2" fill="white" opacity="0.7"/>
    <polygon points="100,58 108,76 92,76" fill="none" stroke="white" stroke-width="4" opacity="0.7"/>
  </g>
</svg>
